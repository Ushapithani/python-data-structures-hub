<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Table Operations</title>

<style>

body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    width:600px;
    margin:50px auto;
    background:#111;
    padding:30px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 25px rgba(124,92,255,.25);
}

h1{
    color:#7c5cff;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
    background:black;
    border:1px solid #7c5cff;
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin:5px 0;
    background:black;
    border:1px solid #7c5cff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#7c5cff;
}

pre{
    background:black;
    padding:15px;
    margin-top:20px;
    min-height:120px;
    color:#00ff66;
    text-align:left;
}

a{
    color:#7c5cff;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Hash Table Operations</h1>

<input
id="key"
placeholder="Enter Key"
>

<input
id="value"
placeholder="Enter Value"
>

<button onclick="insertItem()">
1. Insert Key-Value
</button>

<button onclick="searchItem()">
2. Search Key
</button>

<button onclick="deleteItem()">
3. Delete Key
</button>

<button onclick="displayTable()">
4. Display Hash Table
</button>

<button onclick="countEntries()">
5. Count Entries
</button>

<button onclick="clearTable()">
6. Clear Hash Table
</button>

<pre id="out">Output...</pre>

<a href="nonlinear.html">← Back</a>

</div>

<script>

let hashTable={};

function insertItem(){

let key=
document.getElementById("key")
.value.trim();

let value=
document.getElementById("value")
.value.trim();

if(key===""){

output("Enter Key");

return;

}

hashTable[key]=value;

output(
"Inserted\n\n" +
key +
" : " +
value
);

}

function searchItem(){

let key=
prompt("Enter Key");

if(key in hashTable){

output(
"Found\n\n" +
key +
" : " +
hashTable[key]
);

}else{

output("Key Not Found");

}

}

function deleteItem(){

let key=
prompt("Enter Key");

if(key in hashTable){

delete hashTable[key];

output(
"Deleted Key : " +
key
);

}else{

output("Key Not Found");

}

}

function displayTable(){

let result="";

for(let key in hashTable){

result +=
key +
" : " +
hashTable[key] +
"\n";

}

output(
result || "Hash Table Empty"
);

}

function countEntries(){

output(
"Total Entries : " +
Object.keys(hashTable).length
);

}

function clearTable(){

hashTable={};

output(
"Hash Table Cleared"
);

}

function output(msg){

document.getElementById("out")
.innerText=msg;

}

</script>

</body>
</html>
