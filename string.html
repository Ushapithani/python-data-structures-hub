<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>String Operations</title>

<style>

body{
    margin:0;
    background:black;
    font-family:Arial,sans-serif;
    color:white;
}

.container{
    width:550px;
    margin:50px auto;
    background:#111;
    padding:30px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 25px rgba(124,92,255,.25);
}

h1{
    color:#7c5cff;
    margin-bottom:20px;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
    background:black;
    border:1px solid #7c5cff;
    color:white;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin:5px 0;
    background:black;
    border:1px solid #7c5cff;
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#7c5cff;
}

pre{
    background:black;
    padding:15px;
    margin-top:20px;
    min-height:100px;
    color:#00ff66;
    text-align:left;
    border-radius:6px;
}

a{
    display:block;
    margin-top:15px;
    color:#7c5cff;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>String Operations</h1>

<input
id="str"
placeholder="Enter a string"
>

<button onclick="displayString()">
1. Display
</button>

<button onclick="lengthString()">
2. Length
</button>

<button onclick="upperCase()">
3. Uppercase
</button>

<button onclick="lowerCase()">
4. Lowercase
</button>

<button onclick="capitalizeString()">
5. Capitalize
</button>

<button onclick="reverseString()">
6. Reverse
</button>

<button onclick="searchCharacter()">
7. Search Character
</button>

<button onclick="replaceCharacter()">
8. Replace Text
</button>

<button onclick="wordCount()">
9. Word Count
</button>

<button onclick="clearString()">
10. Clear
</button>

<pre id="out">Output...</pre>

<a href="sequence.html">← Back</a>

</div>

<script>

function getString(){
    return document.getElementById("str").value;
}

function displayString(){
    out.innerText = getString();
}

function lengthString(){
    out.innerText =
    "Length : " +
    getString().length;
}

function upperCase(){
    out.innerText =
    getString().toUpperCase();
}

function lowerCase(){
    out.innerText =
    getString().toLowerCase();
}

function capitalizeString(){

    let s = getString();

    if(s.length===0){
        out.innerText="Empty String";
        return;
    }

    out.innerText =
    s.charAt(0).toUpperCase() +
    s.slice(1).toLowerCase();
}

function reverseString(){

    out.innerText =
    getString()
    .split("")
    .reverse()
    .join("");

}

function searchCharacter(){

    let ch =
    prompt("Enter character");

    if(ch===null) return;

    let pos =
    getString().indexOf(ch);

    if(pos===-1)
        out.innerText="Not Found";
    else
        out.innerText=
        "Found At Position : "
        + pos;
}

function replaceCharacter(){

    let oldText =
    prompt("Text to replace");

    if(oldText===null) return;

    let newText =
    prompt("New text");

    if(newText===null) return;

    out.innerText =
    getString().replaceAll(
        oldText,
        newText
    );
}

function wordCount(){

    let count =
    getString()
    .trim()
    .split(/\s+/)
    .filter(word=>word.length>0)
    .length;

    out.innerText =
    "Words : " + count;
}

function clearString(){

    document.getElementById("str").value="";

    out.innerText="Cleared";

}

</script>

</body>
</html>
